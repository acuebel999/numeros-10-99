<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>¡Aprendo los Números!</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --dec-color: #e8213a;
    --uni-color: #1a6fd4;
    --dec-light: #ffd6da;
    --uni-light: #d0e8ff;
    --bg: #fffbf0;
    --card-bg: #ffffff;
    --green: #22c55e;
    --yellow: #f59e0b;
    --purple: #8b5cf6;
    --shadow: 0 6px 20px rgba(0,0,0,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    background-image: 
      radial-gradient(circle at 10% 20%, #ffe4e8 0%, transparent 40%),
      radial-gradient(circle at 90% 80%, #dbeafe 0%, transparent 40%),
      radial-gradient(circle at 50% 50%, #fef9c3 0%, transparent 60%);
  }

  header {
    text-align: center;
    padding: 24px 16px 8px;
  }
  header h1 {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(1.8rem, 5vw, 3rem);
    color: #333;
    letter-spacing: 1px;
  }
  header h1 span.d { color: var(--dec-color); }
  header h1 span.u { color: var(--uni-color); }

  .score-bar {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin: 8px auto;
    font-size: 1rem;
    font-weight: 700;
  }
  .score-bar span {
    background: white;
    border-radius: 20px;
    padding: 4px 16px;
    box-shadow: var(--shadow);
  }
  .score-bar .correct { color: var(--green); }
  .score-bar .wrong { color: var(--dec-color); }

  main {
    max-width: 860px;
    margin: 0 auto;
    padding: 12px 16px 40px;
  }

  /* NUMBER DISPLAY */
  .number-display {
    text-align: center;
    margin-bottom: 20px;
  }
  .big-number {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(5rem, 18vw, 9rem);
    line-height: 1;
    display: inline-block;
    background: white;
    border-radius: 28px;
    padding: 10px 40px;
    box-shadow: var(--shadow);
    cursor: pointer;
    transition: transform 0.15s;
    position: relative;
  }
  .big-number:hover { transform: scale(1.04); }
  .big-number .dec { color: var(--dec-color); }
  .big-number .uni { color: var(--uni-color); }
  .speak-hint {
    font-size: 0.85rem;
    color: #888;
    margin-top: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .speak-hint::before { content: '🔊'; font-size: 1rem; }

  /* SECTIONS */
  .sections {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }
  @media (max-width: 580px) {
    .sections { grid-template-columns: 1fr; }
  }

  .section-card {
    background: white;
    border-radius: 20px;
    padding: 18px;
    box-shadow: var(--shadow);
  }
  .section-title {
    font-family: 'Fredoka One', cursive;
    font-size: 1.1rem;
    margin-bottom: 14px;
    text-align: center;
    color: #444;
  }

  /* WRITTEN OPTIONS (6 choices) */
  .written-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
  }
  .written-btn {
    background: #f8f8ff;
    border: 3px solid #e0e0ef;
    border-radius: 14px;
    padding: 12px 6px;
    font-family: 'Fredoka One', cursive;
    font-size: 1.05rem;
    cursor: pointer;
    transition: all 0.18s;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    min-height: 70px;
    justify-content: center;
  }
  .written-btn:hover:not(:disabled) {
    border-color: var(--purple);
    transform: translateY(-3px);
    box-shadow: 0 4px 12px rgba(139,92,246,0.2);
  }
  .written-btn .speak-icon {
    font-size: 0.75rem;
    color: #aaa;
  }
  .written-btn .word-text {
    font-size: 0.78rem;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    color: #555;
    line-height: 1.2;
    text-align: center;
  }
  .written-btn .num-text .d { color: var(--dec-color); }
  .written-btn .num-text .u { color: var(--uni-color); }

  /* GRAPHIC OPTIONS (4 choices) */
  .graphic-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .graphic-btn {
    background: #f8fff8;
    border: 3px solid #d0e8d0;
    border-radius: 14px;
    padding: 10px 8px;
    cursor: pointer;
    transition: all 0.18s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    min-height: 90px;
    justify-content: center;
  }
  .graphic-btn:hover:not(:disabled) {
    border-color: var(--green);
    transform: translateY(-3px);
    box-shadow: 0 4px 12px rgba(34,197,94,0.2);
  }
  .blocks-container {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    justify-content: center;
    align-items: flex-end;
  }
  .block-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  /* Decena: vertical bar of 10 small squares */
  .decena {
    display: flex;
    flex-direction: column;
    gap: 1.5px;
  }
  .decena-cell {
    width: 10px;
    height: 10px;
    background: var(--dec-color);
    border-radius: 2px;
  }
  /* Unidad: single square */
  .unidad-cell {
    width: 10px;
    height: 10px;
    background: var(--uni-color);
    border-radius: 2px;
  }
  .unidades-row {
    display: flex;
    flex-wrap: wrap;
    gap: 1.5px;
    justify-content: center;
    max-width: 80px;
  }

  /* FEEDBACK STATES */
  .correct-answer {
    border-color: var(--green) !important;
    background: #f0fdf4 !important;
    animation: pop 0.35s ease;
  }
  .wrong-answer {
    border-color: #f87171 !important;
    background: #fff1f2 !important;
    animation: shake 0.4s ease;
  }
  @keyframes pop {
    0% { transform: scale(1); }
    50% { transform: scale(1.1); }
    100% { transform: scale(1); }
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }

  /* NEXT BUTTON */
  .next-btn {
    display: block;
    margin: 22px auto 0;
    background: linear-gradient(135deg, var(--purple), #6d28d9);
    color: white;
    font-family: 'Fredoka One', cursive;
    font-size: 1.3rem;
    padding: 14px 48px;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(139,92,246,0.4);
    transition: all 0.2s;
    opacity: 0;
    pointer-events: none;
  }
  .next-btn.visible {
    opacity: 1;
    pointer-events: all;
    animation: bounce-in 0.4s ease;
  }
  .next-btn:hover { transform: scale(1.06); }
  @keyframes bounce-in {
    0% { transform: scale(0.6); opacity: 0; }
    70% { transform: scale(1.08); }
    100% { transform: scale(1); opacity: 1; }
  }

  /* FEEDBACK BANNER */
  .feedback-banner {
    text-align: center;
    font-family: 'Fredoka One', cursive;
    font-size: 1.6rem;
    min-height: 50px;
    margin-top: 10px;
    transition: all 0.3s;
  }
  .feedback-banner.show-correct { color: var(--green); animation: pop 0.4s ease; }
  .feedback-banner.show-wrong { color: #ef4444; animation: shake 0.4s ease; }

  /* LEGEND */
  .legend {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin: 0 auto 14px;
    font-size: 0.9rem;
    font-weight: 700;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-dot {
    width: 14px; height: 14px; border-radius: 3px;
  }
  .legend-dot.d { background: var(--dec-color); }
  .legend-dot.u { background: var(--uni-color); }

  button:disabled { cursor: default; }
</style>
</head>
<body>

<header>
  <h1>🔢 ¡Aprendo los <span class="d">Números</span>!</h1>
</header>

<div class="score-bar">
  <span class="correct">✅ Aciertos: <span id="scoreCorrect">0</span></span>
  <span class="wrong">❌ Fallos: <span id="scoreWrong">0</span></span>
</div>

<main>
  <div class="number-display">
    <div class="legend">
      <div class="legend-item"><div class="legend-dot d"></div> Decenas</div>
      <div class="legend-item"><div class="legend-dot u"></div> Unidades</div>
    </div>
    <div class="big-number" id="bigNumber" onclick="speakNumber(currentNumber)" title="Pulsa para escuchar">
      <span class="dec" id="decDigit">3</span><span class="uni" id="uniDigit">7</span>
    </div>
    <p class="speak-hint">Pulsa el número para escucharlo</p>
  </div>

  <div class="sections">
    <!-- WRITTEN -->
    <div class="section-card">
      <div class="section-title">📝 ¿Cómo se escribe?</div>
      <div class="written-grid" id="writtenGrid"></div>
    </div>
    <!-- GRAPHIC -->
    <div class="section-card">
      <div class="section-title">🟥🟦 ¿Cómo se representa?</div>
      <div class="graphic-grid" id="graphicGrid"></div>
    </div>
  </div>

  <div class="feedback-banner" id="feedbackBanner"></div>
  <button class="next-btn" id="nextBtn" onclick="newRound()">¡Siguiente número! →</button>
</main>

<script>
const NUMBERS_ES = {
  10:"diez",11:"once",12:"doce",13:"trece",14:"catorce",15:"quince",
  16:"dieciséis",17:"diecisiete",18:"dieciocho",19:"diecinueve",
  20:"veinte",21:"veintiuno",22:"veintidós",23:"veintitrés",24:"veinticuatro",
  25:"veinticinco",26:"veintiséis",27:"veintisiete",28:"veintiocho",29:"veintinueve",
  30:"treinta",31:"treinta y uno",32:"treinta y dos",33:"treinta y tres",34:"treinta y cuatro",
  35:"treinta y cinco",36:"treinta y seis",37:"treinta y siete",38:"treinta y ocho",39:"treinta y nueve",
  40:"cuarenta",41:"cuarenta y uno",42:"cuarenta y dos",43:"cuarenta y tres",44:"cuarenta y cuatro",
  45:"cuarenta y cinco",46:"cuarenta y seis",47:"cuarenta y siete",48:"cuarenta y ocho",49:"cuarenta y nueve",
  50:"cincuenta",51:"cincuenta y uno",52:"cincuenta y dos",53:"cincuenta y tres",54:"cincuenta y cuatro",
  55:"cincuenta y cinco",56:"cincuenta y seis",57:"cincuenta y siete",58:"cincuenta y ocho",59:"cincuenta y nueve",
  60:"sesenta",61:"sesenta y uno",62:"sesenta y dos",63:"sesenta y tres",64:"sesenta y cuatro",
  65:"sesenta y cinco",66:"sesenta y seis",67:"sesenta y siete",68:"sesenta y ocho",69:"sesenta y nueve",
  70:"setenta",71:"setenta y uno",72:"setenta y dos",73:"setenta y tres",74:"setenta y cuatro",
  75:"setenta y cinco",76:"setenta y seis",77:"setenta y siete",78:"setenta y ocho",79:"setenta y nueve",
  80:"ochenta",81:"ochenta y uno",82:"ochenta y dos",83:"ochenta y tres",84:"ochenta y cuatro",
  85:"ochenta y cinco",86:"ochenta y seis",87:"ochenta y siete",88:"ochenta y ocho",89:"ochenta y nueve",
  90:"noventa",91:"noventa y uno",92:"noventa y dos",93:"noventa y tres",94:"noventa y cuatro",
  95:"noventa y cinco",96:"noventa y seis",97:"noventa y siete",98:"noventa y ocho",99:"noventa y nueve"
};

let currentNumber = 37;
let writtenAnswered = false;
let graphicAnswered = false;
let scoreCorrect = 0;
let scoreWrong = 0;

function rand(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function speakNumber(n) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(String(n));
  utt.lang = 'es-ES';
  utt.rate = 0.85;
  window.speechSynthesis.speak(utt);
}

function speakText(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'es-ES';
  utt.rate = 0.85;
  window.speechSynthesis.speak(utt);
}

function buildBlocksHTML(dec, uni) {
  let html = '<div class="blocks-container">';
  // Decenas
  for (let i = 0; i < dec; i++) {
    html += '<div class="decena">';
    for (let j = 0; j < 10; j++) {
      html += '<div class="decena-cell"></div>';
    }
    html += '</div>';
  }
  // Unidades
  if (uni > 0) {
    html += '<div class="unidades-row">';
    for (let i = 0; i < uni; i++) {
      html += '<div class="unidad-cell"></div>';
    }
    html += '</div>';
  }
  html += '</div>';
  return html;
}

function formatNumColored(n) {
  const s = String(n);
  const d = s[0];
  const u = s[1];
  return `<span class="num-text"><span class="d">${d}</span><span class="u">${u}</span></span>`;
}

function shuffle(arr) {
  return arr.sort(() => Math.random() - 0.5);
}

function getDistractors(correct, count, min, max) {
  const set = new Set([correct]);
  while (set.size < count + 1) {
    set.add(rand(min, max));
  }
  return shuffle([...set]);
}

function newRound() {
  currentNumber = rand(10, 99);
  const dec = Math.floor(currentNumber / 10);
  const uni = currentNumber % 10;

  document.getElementById('decDigit').textContent = dec;
  document.getElementById('uniDigit').textContent = uni;

  writtenAnswered = false;
  graphicAnswered = false;

  document.getElementById('feedbackBanner').textContent = '';
  document.getElementById('feedbackBanner').className = 'feedback-banner';
  document.getElementById('nextBtn').className = 'next-btn';

  // Speak after short delay
  setTimeout(() => speakNumber(currentNumber), 300);

  buildWritten(currentNumber);
  buildGraphic(dec, uni);
}

function buildWritten(correct) {
  const options = getDistractors(correct, 5, 10, 99);
  const grid = document.getElementById('writtenGrid');
  grid.innerHTML = '';

  options.forEach(n => {
    const btn = document.createElement('button');
    btn.className = 'written-btn';
    const word = NUMBERS_ES[n] || String(n);
    btn.innerHTML = `
      ${formatNumColored(n)}
      <span class="word-text">${word}</span>
      <span class="speak-icon">🔊</span>
    `;
    btn.onclick = () => {
      speakText(word);
      if (writtenAnswered) return;
      writtenAnswered = true;
      const isCorrect = n === correct;
      btn.classList.add(isCorrect ? 'correct-answer' : 'wrong-answer');
      disableGrid('writtenGrid');
      if (!isCorrect) {
        // highlight correct
        [...grid.querySelectorAll('button')].forEach(b => {
          if (b !== btn) {
            const bWord = b.querySelector('.word-text').textContent;
            if (bWord === NUMBERS_ES[correct]) b.classList.add('correct-answer');
          }
        });
      }
      recordAnswer(isCorrect);
    };
    grid.appendChild(btn);
  });
}

function buildGraphic(dec, uni) {
  const correct = currentNumber;
  // Generate 3 wrong graphic options (different dec/uni combos)
  const wrongs = new Set();
  while (wrongs.size < 3) {
    const n = rand(10, 99);
    if (n !== correct) wrongs.add(n);
  }
  const options = shuffle([correct, ...wrongs]);
  const grid = document.getElementById('graphicGrid');
  grid.innerHTML = '';

  options.forEach(n => {
    const d = Math.floor(n / 10);
    const u = n % 10;
    const btn = document.createElement('button');
    btn.className = 'graphic-btn';
    btn.innerHTML = buildBlocksHTML(d, u);
    btn.onclick = () => {
      if (graphicAnswered) return;
      graphicAnswered = true;
      const isCorrect = n === correct;
      btn.classList.add(isCorrect ? 'correct-answer' : 'wrong-answer');
      disableGrid('graphicGrid');
      if (!isCorrect) {
        [...grid.querySelectorAll('button')].forEach((b, i) => {
          if (options[i] === correct) b.classList.add('correct-answer');
        });
      }
      recordAnswer(isCorrect);
    };
    grid.appendChild(btn);
  });
}

function disableGrid(id) {
  document.getElementById(id).querySelectorAll('button').forEach(b => b.disabled = true);
}

function recordAnswer(isCorrect) {
  if (isCorrect) {
    scoreCorrect++;
    document.getElementById('scoreCorrect').textContent = scoreCorrect;
  } else {
    scoreWrong++;
    document.getElementById('scoreWrong').textContent = scoreWrong;
  }

  if (writtenAnswered && graphicAnswered) {
    // Both answered
    const allCorrect = /* we'll track separately */ true;
    showFeedback(isCorrect);
    document.getElementById('nextBtn').className = 'next-btn visible';
  }
}

let lastWrittenCorrect = false;
let lastGraphicCorrect = false;

function buildWritten2(correct) {
  const options = getDistractors(correct, 5, 10, 99);
  const grid = document.getElementById('writtenGrid');
  grid.innerHTML = '';
  options.forEach(n => {
    const btn = document.createElement('button');
    btn.className = 'written-btn';
    const word = NUMBERS_ES[n] || String(n);
    btn.innerHTML = `
      ${formatNumColored(n)}
      <span class="word-text">${word}</span>
      <span class="speak-icon">🔊</span>
    `;
    btn.onclick = () => {
      speakText(word);
      if (writtenAnswered) return;
      writtenAnswered = true;
      lastWrittenCorrect = n === correct;
      btn.classList.add(lastWrittenCorrect ? 'correct-answer' : 'wrong-answer');
      disableGrid('writtenGrid');
      if (!lastWrittenCorrect) {
        [...grid.querySelectorAll('button')].forEach(b => {
          if (b.querySelector('.word-text').textContent === NUMBERS_ES[correct]) b.classList.add('correct-answer');
        });
      }
      checkBothAnswered();
    };
    grid.appendChild(btn);
  });
}

function buildGraphic2(dec, uni, correct) {
  const wrongs = new Set();
  while (wrongs.size < 3) {
    const n = rand(10, 99);
    if (n !== correct) wrongs.add(n);
  }
  const options = shuffle([correct, ...wrongs]);
  const grid = document.getElementById('graphicGrid');
  grid.innerHTML = '';
  options.forEach(n => {
    const d = Math.floor(n / 10);
    const u = n % 10;
    const btn = document.createElement('button');
    btn.className = 'graphic-btn';
    btn.innerHTML = buildBlocksHTML(d, u);
    btn.onclick = () => {
      if (graphicAnswered) return;
      graphicAnswered = true;
      lastGraphicCorrect = n === correct;
      btn.classList.add(lastGraphicCorrect ? 'correct-answer' : 'wrong-answer');
      disableGrid('graphicGrid');
      if (!lastGraphicCorrect) {
        [...grid.querySelectorAll('button')].forEach((b, i) => {
          if (options[i] === correct) b.classList.add('correct-answer');
        });
      }
      checkBothAnswered();
    };
    grid.appendChild(btn);
  });
}

function checkBothAnswered() {
  if (!writtenAnswered || !graphicAnswered) return;
  const allCorrect = lastWrittenCorrect && lastGraphicCorrect;
  const banner = document.getElementById('feedbackBanner');
  if (allCorrect) {
    banner.textContent = '🎉 ¡Perfecto! ¡Lo has acertado todo!';
    banner.className = 'feedback-banner show-correct';
    speakText('¡Muy bien! ¡Perfecto!');
  } else if (lastWrittenCorrect || lastGraphicCorrect) {
    banner.textContent = '👍 ¡Casi! Sigue practicando.';
    banner.className = 'feedback-banner show-correct';
  } else {
    banner.textContent = '💪 ¡Inténtalo de nuevo la próxima vez!';
    banner.className = 'feedback-banner show-wrong';
  }
  document.getElementById('nextBtn').className = 'next-btn visible';
}

function showFeedback() {} // replaced above

// Rewrite newRound to use v2 builders
function newRound() {
  currentNumber = rand(10, 99);
  const dec = Math.floor(currentNumber / 10);
  const uni = currentNumber % 10;

  document.getElementById('decDigit').textContent = dec;
  document.getElementById('uniDigit').textContent = uni;

  writtenAnswered = false;
  graphicAnswered = false;
  lastWrittenCorrect = false;
  lastGraphicCorrect = false;

  document.getElementById('feedbackBanner').textContent = '';
  document.getElementById('feedbackBanner').className = 'feedback-banner';
  document.getElementById('nextBtn').className = 'next-btn';

  setTimeout(() => speakNumber(currentNumber), 300);

  buildWritten2(currentNumber);
  buildGraphic2(dec, uni, currentNumber);
}

// Init
newRound();
</script>
</body>
</html>
